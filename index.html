<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق الإعلانات - سوريا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        /* header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #1a1a2e;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
        }

        /* شريط البحث */
        .search-section {
            background: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
font-size: 16px;
            margin-bottom: 15px;
        }

        .search-input:focus {
            outline: none;
            border-color: #007bff;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .filter-select {
            flex: 1;
            min-width: 150px;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
        }

        .reset-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
        }

        .reset-btn:hover {
            background: #5a6268;
        }

        .results-count {
            background: #e9ecef;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            margin-top: 10px;
            display: inline-block;
        }

        /* شريط التصنيفات */
        .categories-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .cat-btn {
            background: #f0f2f5;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .cat-btn:hover, .cat-btn.active {
            background: #007bff;
            color: white;
        }

        /* شبكة الإعلانات - عنوان فقط */
        .ads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* بطاقة الإعلان - عنوان فقط */
        .ad-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            border-right: 4px solid #007bff;
        }

        .ad-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .ad-card.pinned {
            border-right-color: #ff9800;
            background: #fffaf0;
        }

        .ad-content {
            padding: 20px;
        }

        .ad-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pin-badge {
            background: #ff9800;
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .ad-category, .ad-city {
            background: #e9ecef;
            color: #495057;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .ad-city {
            background: #e3f2fd;
            color: #1565c0;
        }

        .ad-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1a1a2e;
            margin: 10px 0;
            line-height: 1.4;
        }

        .ad-price {
            font-size: 1.1rem;
            font-weight: bold;
            color: #28a745;
            margin: 10px 0;
        }

        .ad-date {
            color: #999;
            font-size: 0.7rem;
            margin-top: 10px;
        }

        /* نافذة التفاصيل المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            overflow-y: auto;
            direction: rtl;
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            max-width: 500px;
            width: 90%;
            border-radius: 20px;
            overflow: hidden;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: #007bff;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.2rem;
        }

        .modal-close {
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
        }

        .modal-body {
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }

        /* صور في النافذة المنبثقة */
        .modal-image-container {
            width: 100%;
            margin-bottom: 15px;
        }

        .modal-main-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
        }

        .modal-thumbnails {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .modal-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .modal-thumb:hover {
            border-color: #007bff;
        }

        .modal-detail {
            margin: 12px 0;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .modal-detail-label {
            font-weight: bold;
            color: #555;
            font-size: 0.8rem;
        }

        .modal-detail-value {
            font-size: 1rem;
            color: #333;
            margin-top: 4px;
        }

        .ad-description-full {
            line-height: 1.6;
            color: #444;
        }

        .modal-contact {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-top: 15px;
        }

        .modal-contact a {
            color: #007bff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .expiry-badge {
            background: #dc3545;
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .no-image {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            border-radius: 12px;
            height: 200px;
        }

        @media (max-width: 768px) {
            .ads-grid {
                grid-template-columns: 1fr;
            }
            .filter-row {
                flex-direction: column;
            }
            .filter-select {
                width: 100%;
            }
            .modal-content {
                margin: 20px auto;
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📢 سوق الإعلانات - سوريا</h1>
            <p class="subtitle">عقارات | سيارات | وظائف | مستعمل</p>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث عن إعلان...">
            <div class="filter-row">
                <select id="cityFilter" class="filter-select">
                    <option value="all">🌍 جميع المدن</option>
                </select>
                <button class="reset-btn" onclick="resetFilters()">🔄 إعادة تعيين</button>
            </div>
            <div id="resultsCount" class="results-count"></div>
        </div>

        <div class="categories-bar" id="categoriesList">
            <button class="cat-btn active" data-cat="all">الكل</button>
        </div>

        <div id="adsContainer" class="ads-grid">
            <div class="loading">⏳ جاري تحميل الإعلانات...</div>
        </div>
    </div>

    <!-- نافذة التفاصيل المنبثقة -->
    <div id="detailsModal" class="modal" onclick="closeModalIfOutside(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">تفاصيل الإعلان</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="loading">جاري التحميل...</div>
            </div>
        </div>
    </div>

    <!-- نافذة عرض الصور المكبرة -->
    <div id="imageModal" class="modal" onclick="closeImageModal()">
        <div class="modal-content" style="max-width: 90%; background: transparent; margin: 50px auto;">
            <button class="modal-close" style="color: white; float: left;" onclick="closeImageModal()">&times;</button>
            <img id="fullImage" src="" style="width: 100%; border-radius: 12px;">
        </div>
    </div>

    <script>
        let allAds = [];
        let categories = [];
        let currentCategory = 'all';
        let currentSearch = '';
        let currentCity = 'all';

        const syrianCities = [
            'دمشق', 'حلب', 'حمص', 'حماة', 'اللاذقية', 'طرطوس', 'دير الزور', 'الحسكة', 
            'السويداء', 'درعا', 'إدلب', 'الرقة', 'القنيطرة', 'ريف دمشق', 'قدسيا', 
            'جرمانا', 'دوما', 'حرستا', 'داريا', 'التل', 'الزبداني', 'يبرود', 'النابك',
            'قطنا', 'معضمية الشام', 'الميادين', 'البوكمال', 'عين العرب', 'عفرين', 
            'الباب', 'منبج', 'جرابلس', 'رأس العين', 'القامشلي', 'عامودا', 'المالكية',
            'الدرباسية', 'جسر الشغور', 'معرة النعمان', 'خان شيخون', 'أريحا', 'سلمية',
            'مصياف', 'السقيلبية', 'محردة', 'كفرزيتا', 'بانياس', 'جبلة', 'القرداحة',
            'الحفة', 'صافيتا', 'الشيخ بدر', 'دوير رسلان', 'المختارية'
        ];

        async function loadData() {
            try {
                const response = await fetch('ads.json?v=' + Date.now());
                const data = await response.json();
                allAds = data.ads || [];
                categories = data.categories || ['عقارات', 'سيارات', 'وظائف', 'أدوات منزلية', 'مستعمل'];
                
                const citySelect = document.getElementById('cityFilter');
                syrianCities.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
                
                renderCategories();
                filterAndRenderAds();
            } catch(e) {
                document.getElementById('adsContainer').innerHTML = '<p class="loading">⚠️ خطأ في تحميل البيانات</p>';
                console.error('خطأ:', e);
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoriesList');
            container.innerHTML = '<button class="cat-btn active" data-cat="all">الكل</button>';
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.textContent = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = cat;
                    filterAndRenderAds();
                };
                container.appendChild(btn);
            });
        }

        function filterAndRenderAds() {
            let filtered = [...allAds];
            
            if (currentCategory !== 'all') {
                filtered = filtered.filter(ad => ad.category === currentCategory);
            }
            
            if (currentCity !== 'all') {
                filtered = filtered.filter(ad => ad.city === currentCity);
            }
            
            if (currentSearch.trim() !== '') {
                const searchTerm = currentSearch.toLowerCase();
                filtered = filtered.filter(ad => 
                    (ad.title && ad.title.toLowerCase().includes(searchTerm)) ||
                    (ad.description && ad.description.toLowerCase().includes(searchTerm)) ||
                    (ad.price && ad.price.toLowerCase().includes(searchTerm)) ||
                    (ad.city && ad.city.toLowerCase().includes(searchTerm))
                );
            }
            
            const today = new Date().toISOString().split('T')[0];
            filtered = filtered.filter(ad => !ad.expiry_date || ad.expiry_date >= today);
            
            filtered.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
            
            document.getElementById('resultsCount').textContent = `📊 ${filtered.length} إعلان`;
            renderAdsList(filtered);
        }

        function renderAdsList(ads) {
            const container = document.getElementById('adsContainer');
            
            if(ads.length === 0) {
                container.innerHTML = '<div class="loading">📭 لا توجد إعلانات مطابقة للبحث</div>';
                return;
            }

            container.innerHTML = ads.map(ad => `
                <div class="ad-card ${ad.pinned ? 'pinned' : ''}" onclick="showAdDetails('${ad.id}')">
                    <div class="ad-content">
                        <div class="ad-header">
                            ${ad.pinned ? '<span class="pin-badge">📌 مثبت</span>' : ''}
                            <span class="ad-category">${escapeHtml(ad.category)}</span>
                            ${ad.city ? `<span class="ad-city">📍 ${escapeHtml(ad.city)}</span>` : ''}
                        </div>
                        <div class="ad-title">${escapeHtml(ad.title)}</div>
                        <div class="ad-price">💰 ${escapeHtml(ad.price)}</div>
                        <div class="ad-date">📅 ${ad.date || ''}</div>
                    </div>
                </div>
            `).join('');
        }

        function showAdDetails(adId) {
            const ad = allAds.find(a => a.id === adId);
            if (!ad) return;
            
            const modal = document.getElementById('detailsModal');
            const modalBody = document.getElementById('modalBody');
            
            // بناء محتوى النافذة المنبثقة
            let imagesHtml = '';
            if (ad.images && ad.images.length > 0) {
                imagesHtml = `
                    <div class="modal-image-container">
                        <img class="modal-main-image" src="${ad.images[0]}" onclick="showFullImage('${ad.images[0]}')">
                        ${ad.images.length > 1 ? `
                            <div class="modal-thumbnails">
                                ${ad.images.map(img => `
                                    <img class="modal-thumb" src="${img}" onclick="showFullImage('${img}')">
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            } else {
                imagesHtml = `<div class="no-image">📷 لا توجد صور</div>`;
            }
            
            modalBody.innerHTML = `
                ${imagesHtml}
                <div class="modal-detail">
                    <div class="modal-detail-label">📝 الوصف</div>
                    <div class="modal-detail-value ad-description-full">${escapeHtml(ad.description)}</div>
                </div>
                <div class="modal-detail">
                    <div class="modal-detail-label">💰 السعر</div>
                    <div class="modal-detail-value">${escapeHtml(ad.price)}</div>
                </div>
                <div class="modal-detail">
                    <div class="modal-detail-label">📍 المنطقة</div>
                    <div class="modal-detail-value">${escapeHtml(ad.city || 'غير محدد')}</div>
                </div>
                <div class="modal-detail">
                    <div class="modal-detail-label">📅 تاريخ النشر</div>
                    <div class="modal-detail-value">${ad.date || ''}</div>
                </div>
                ${ad.expiry_date ? `
                    <div class="modal-detail">
                        <div class="modal-detail-label">⏰ ينتهي في</div>
                        <div class="modal-detail-value expiry-badge" style="display: inline-block;">${ad.expiry_date}</div>
                    </div>
                ` : ''}
                <div class="modal-contact">
                    📞 <a href="tel:${ad.contact}">${escapeHtml(ad.contact)}</a>
                    <br><small>اضغط على الرقم للاتصال</small>
                </div>
                <div class="modal-detail">
                    <div class="modal-detail-label">🆔 رقم الإعلان</div>
                    <div class="modal-detail-value" style="font-family: monospace;">${ad.id}</div>
                </div>
            `;
            
            document.getElementById('modalTitle').innerHTML = `📌 ${escapeHtml(ad.title)}`;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function showFullImage(url) {
            const modal = document.getElementById('imageModal');
            const fullImg = document.getElementById('fullImage');
            fullImg.src = url;
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('detailsModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        function closeModalIfOutside(event) {
            if (event.target === document.getElementById('detailsModal')) {
                closeModal();
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        function resetFilters() {
            currentSearch = '';
            currentCity = 'all';
            document.getElementById('searchInput').value = '';
            document.getElementById('cityFilter').value = 'all';
            filterAndRenderAds();
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            filterAndRenderAds();
        });

        document.getElementById('cityFilter').addEventListener('change', (e) => {
            currentCity = e.target.value;
            filterAndRenderAds();
        });

        loadData();
    </script>
</body>
</html>
